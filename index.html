<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Флотилия</title>

<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">

<style>
  html, body { height:100%; margin:0; }
  #panorama { width:150%; height:150%; }
</style>
</head>

<body>
<div id="panorama"></div>

<script>
const scenes = {
  "scene-1": {
    title: "Санузел",
    type: "equirectangular",
    panorama: "panorama1.jpg",
    autoLoad: true,
    hotSpots: [
      { pitch: 0, yaw: 0, type: "info", text: "Перейти к панораме №2", sceneId: "scene-2" }
    ]
  },
  "scene-2": {
    title: "Панорама №2",
    type: "equirectangular",
    panorama: "panorama2.jpg",
    autoLoad: false,
    hotSpots: [
      { pitch: 3, yaw: -23, type: "info", text: "Вернуться к панораме №1", sceneId: "scene-1" }
    ]
  }
};

const viewer = pannellum.viewer('panorama', {
  default: { firstScene: 'scene-1' },
  scenes
});

viewer.on('hotSpotClick', function (e, id, args) {
  if (args && args.sceneId) viewer.loadScene(args.sceneId);
});
</script>
</body>
</html>
